name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install ruff
      run: pip install ruff

    - name: Run ruff linting
      run: ruff check .

    - name: Check formatting
      run: ruff format --check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov pyyaml
        pip install -r blender-demo/requirements.txt

    - name: Run tests with coverage
      run: |
        pytest --cov=tests --cov-report=term --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Check test count
      run: |
        TEST_COUNT=$(pytest --collect-only -q | grep -E "test session starts" -A 999 | grep -oP '\d+(?= passed)' || echo "0")
        echo "Test count: ${TEST_COUNT}"
        if [ "${TEST_COUNT}" -lt 40 ]; then
          echo "ERROR: Only ${TEST_COUNT} tests, minimum is 40"
          exit 1
        fi
        echo "✓ Test count requirement met (${TEST_COUNT} tests)"

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install mypy
      run: pip install mypy types-PyYAML

    - name: Run mypy
      run: mypy blender-demo/scripts/ --ignore-missing-imports || true

  validate-config:
    name: Validate Configuration Files
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install pyyaml

    - name: Validate YAML files
      run: |
        python -c "import yaml; yaml.safe_load(open('cf/codebuild.yml'))"
        python -c "import yaml; yaml.safe_load(open('buildspec.yml/blender-whl.yml'))"

    - name: Validate buildspec path exists
      run: |
        if [ ! -f "buildspec.yml/blender-whl.yml" ]; then
          echo "ERROR: buildspec.yml/blender-whl.yml not found"
          exit 1
        fi

  build-script-check:
    name: Build Script Syntax Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check build script syntax
      run: bash -n build_blender_wheel.sh

    - name: Check script is executable
      run: |
        if [ ! -x build_blender_wheel.sh ]; then
          echo "ERROR: build_blender_wheel.sh is not executable"
          exit 1
        fi
